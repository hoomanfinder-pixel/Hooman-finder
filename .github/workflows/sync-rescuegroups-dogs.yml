name: Sync RescueGroups Dogs

on:
  schedule:
    # Runs every day at 7:00 AM Eastern during daylight saving time.
    # GitHub Actions uses UTC, so 11:00 UTC = 7:00 AM EDT.
    - cron: "0 11 * * *"

  workflow_dispatch:

jobs:
  sync-dogs:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Run RescueGroups dog sync
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESCUEGROUPS_API_KEY: ${{ secrets.RESCUEGROUPS_API_KEY }}
        run: node sync-rescuegroups-dogs.cjs
